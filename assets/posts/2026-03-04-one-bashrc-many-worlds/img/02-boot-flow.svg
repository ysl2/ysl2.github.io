<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-label="Bilingual boot flow of shell config">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2430"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff6da"/>
      <stop offset="100%" stop-color="#ffe8a3"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#d4d9e2"/>
    </marker>
  </defs>
  <rect width="1400" height="980" fill="url(#bg)"/>
  <text x="64" y="76" fill="#ffffff" font-size="44" font-family="SF Pro Display, PingFang SC, Noto Sans CJK SC, sans-serif" font-weight="700">Boot Flow / 启动决策流</text>
  <text x="64" y="114" fill="#bac4d5" font-size="24" font-family="SF Pro Text, PingFang SC, Noto Sans CJK SC, sans-serif">From shell entry to working state / 从 shell 进入到可工作状态</text>

  <g>
    <rect x="90" y="170" width="320" height="86" rx="16" fill="url(#node)"/>
    <text x="120" y="220" fill="#24324a" font-size="27" font-family="SF Pro Text, PingFang SC, Noto Sans CJK SC, sans-serif" font-weight="600">Shell start / shell 启动</text>

    <rect x="540" y="170" width="380" height="86" rx="16" fill="url(#node)"/>
    <text x="572" y="206" fill="#24324a" font-size="26" font-family="SF Pro Text, PingFang SC, Noto Sans CJK SC, sans-serif" font-weight="600">Interactive + TTY ?</text>
    <text x="572" y="234" fill="#3a4a67" font-size="22" font-family="SF Pro Text, PingFang SC, Noto Sans CJK SC, sans-serif">交互且有终端?</text>

    <rect x="1010" y="170" width="280" height="86" rx="16" fill="#3b475e"/>
    <text x="1052" y="223" fill="#e5ebf4" font-size="24" font-family="SF Pro Text, PingFang SC, Noto Sans CJK SC, sans-serif">return / 退出</text>

    <rect x="540" y="330" width="380" height="96" rx="16" fill="url(#node)"/>
    <text x="572" y="368" fill="#24324a" font-size="25" font-family="SF Pro Text, PingFang SC, Noto Sans CJK SC, sans-serif" font-weight="600">Load base env / 基础环境</text>
    <text x="572" y="398" fill="#3a4a67" font-size="21" font-family="SF Pro Text, PingFang SC, Noto Sans CJK SC, sans-serif">PATH, input method, mirrors, editor</text>

    <rect x="540" y="500" width="380" height="98" rx="16" fill="url(#node)"/>
    <text x="572" y="542" fill="#24324a" font-size="24" font-family="SF Pro Text, PingFang SC, Noto Sans CJK SC, sans-serif" font-weight="600">Local TTY1 + no GUI?</text>
    <text x="572" y="572" fill="#3a4a67" font-size="21" font-family="SF Pro Text, PingFang SC, Noto Sans CJK SC, sans-serif">本地 TTY1 且无图形会话?</text>

    <rect x="90" y="680" width="360" height="98" rx="16" fill="#99d98c"/>
    <text x="120" y="722" fill="#173d2d" font-size="24" font-family="SF Pro Text, PingFang SC, Noto Sans CJK SC, sans-serif" font-weight="600">exec MYWAYLAND</text>
    <text x="120" y="752" fill="#1e4d38" font-size="21" font-family="SF Pro Text, PingFang SC, Noto Sans CJK SC, sans-serif">or / 或者</text>

    <rect x="510" y="680" width="220" height="98" rx="16" fill="#99d98c"/>
    <text x="540" y="737" fill="#173d2d" font-size="24" font-family="SF Pro Text, PingFang SC, Noto Sans CJK SC, sans-serif" font-weight="600">exec startx</text>

    <rect x="850" y="680" width="440" height="98" rx="16" fill="url(#node)"/>
    <text x="882" y="718" fill="#24324a" font-size="24" font-family="SF Pro Text, PingFang SC, Noto Sans CJK SC, sans-serif" font-weight="600">Optional boots / 可选自动化</text>
    <text x="882" y="748" fill="#3a4a67" font-size="21" font-family="SF Pro Text, PingFang SC, Noto Sans CJK SC, sans-serif">tmux + conda via lock files</text>

    <rect x="850" y="840" width="440" height="88" rx="16" fill="#7cc6fe"/>
    <text x="882" y="892" fill="#14344c" font-size="25" font-family="SF Pro Text, PingFang SC, Noto Sans CJK SC, sans-serif" font-weight="600">Ready to work / 进入工作状态</text>
  </g>

  <g stroke="#d4d9e2" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <line x1="410" y1="213" x2="540" y2="213"/>
    <line x1="920" y1="213" x2="1010" y2="213"/>
    <line x1="730" y1="256" x2="730" y2="330"/>
    <line x1="730" y1="426" x2="730" y2="500"/>
    <line x1="630" y1="598" x2="270" y2="680"/>
    <line x1="730" y1="598" x2="620" y2="680"/>
    <line x1="830" y1="598" x2="1030" y2="680"/>
    <line x1="1070" y1="778" x2="1070" y2="840"/>
  </g>

  <text x="944" y="199" fill="#a9b7cc" font-size="18" font-family="SF Pro Text, PingFang SC, Noto Sans CJK SC, sans-serif">No / 否</text>
  <text x="744" y="308" fill="#a9b7cc" font-size="18" font-family="SF Pro Text, PingFang SC, Noto Sans CJK SC, sans-serif">Yes / 是</text>
</svg>
